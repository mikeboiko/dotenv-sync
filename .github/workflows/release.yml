name: Manual Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Which semantic version part to bump
        required: true
        type: choice
        options:
          - major
          - minor
          - patch
      release_notes:
        description: Optional release notes for the GitHub release
        required: false
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure workflow is running from the default branch
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          test "${GITHUB_REF_NAME}" = "${DEFAULT_BRANCH}" || {
            echo "Release workflow must run from ${DEFAULT_BRANCH}, got ${GITHUB_REF_NAME}" >&2
            exit 1
          }

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Fetch tags
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          git fetch --force --tags origin
          git fetch --force origin "${DEFAULT_BRANCH}"
          test "$(git rev-parse HEAD)" = "$(git rev-parse "origin/${DEFAULT_BRANCH}")" || {
            echo "Release workflow must run from the latest ${DEFAULT_BRANCH} commit" >&2
            exit 1
          }

      - name: Compute release version
        id: version
        run: |
          VERSION="$(go run ./scripts/nextversion --bump "${{ inputs.bump }}")"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Ensure the release tag does not already exist
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          if git rev-parse -q --verify "refs/tags/${VERSION}" >/dev/null; then
            echo "Release tag ${VERSION} already exists" >&2
            exit 1
          fi

      - name: Run test suite
        run: go test ./...

      - name: Build release artifacts
        env:
          VERSION: ${{ steps.version.outputs.version }}
          COMMIT: ${{ github.sha }}
        run: |
          set -euo pipefail
          BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          mkdir -p dist
          targets="linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64"
          for target in ${targets}; do
            GOOS="${target%/*}"
            GOARCH="${target#*/}"
            workdir=".release/build_${GOOS}_${GOARCH}"
            mkdir -p "${workdir}"
            ext=""
            if [ "${GOOS}" = "windows" ]; then
              ext=".exe"
            fi
            binary="${workdir}/ds${ext}"
            GOOS="${GOOS}" GOARCH="${GOARCH}" go build -trimpath -ldflags "-X dotenv-sync/pkg/dotenvsync.Version=${VERSION} -X dotenv-sync/pkg/dotenvsync.Commit=${COMMIT} -X dotenv-sync/pkg/dotenvsync.BuildTime=${BUILD_TIME}" -o "${binary}" ./cmd/ds
            if [ "${GOOS}" = "windows" ]; then
              asset="dist/ds_${VERSION}_windows_${GOARCH}.zip"
              (cd "${workdir}" && zip -q -j "../../$(basename "${asset}")" "ds${ext}")
            else
              asset="dist/ds_${VERSION}_${GOOS}_${GOARCH}.tar.gz"
              tar -C "${workdir}" -czf "${asset}" "ds${ext}"
            fi
          done

      - name: Verify the Linux release artifact reports its version
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          mkdir -p dist/verify
          tar -C dist/verify -xzf "dist/ds_${VERSION}_linux_amd64.tar.gz"
          test "$(dist/verify/ds --version)" = "ds ${VERSION}"

      - name: Publish GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
          RELEASE_NOTES: ${{ inputs.release_notes }}
        run: |
          if [ -n "${RELEASE_NOTES}" ]; then
            gh release create "${VERSION}" dist/ds_* --title "Release ${VERSION}" --notes "${RELEASE_NOTES}" --target "${GITHUB_SHA}"
          else
            gh release create "${VERSION}" dist/ds_* --title "Release ${VERSION}" --generate-notes --target "${GITHUB_SHA}"
          fi
