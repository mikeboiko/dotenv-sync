name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Validate release tag
        id: version
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME}"
          if ! [[ "${VERSION}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::release workflow requires a stable semver tag like v1.2.3, got ${VERSION}"
            exit 1
          fi
          printf 'version=%s\n' "${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "Preparing tagged release ${VERSION}"

      - name: Run test suite
        run: go test ./...

      - name: Build release artifacts
        env:
          VERSION: ${{ steps.version.outputs.version }}
          COMMIT: ${{ github.sha }}
        run: |
          set -euo pipefail
          BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          rm -rf dist .release
          mkdir -p dist .release
          targets="linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64"

          for target in ${targets}; do
            GOOS="${target%/*}"
            GOARCH="${target#*/}"
            workdir=".release/build_${GOOS}_${GOARCH}"
            rm -rf "${workdir}"
            mkdir -p "${workdir}"
            ext=""
            if [ "${GOOS}" = "windows" ]; then
              ext=".exe"
            fi

            binary="${workdir}/ds${ext}"
            cp LICENSE README.md "${workdir}/"
            CGO_ENABLED=0 GOOS="${GOOS}" GOARCH="${GOARCH}" go build -trimpath \
              -ldflags "-X dotenv-sync/pkg/dotenvsync.Version=${VERSION} -X dotenv-sync/pkg/dotenvsync.Commit=${COMMIT} -X dotenv-sync/pkg/dotenvsync.BuildTime=${BUILD_TIME}" \
              -o "${binary}" ./cmd/ds

            if [ "${GOOS}" = "windows" ]; then
              asset="dist/ds_${VERSION}_windows_${GOARCH}.zip"
              (cd "${workdir}" && zip -q -j "../../$(basename "${asset}")" "ds${ext}" LICENSE README.md)
            else
              asset="dist/ds_${VERSION}_${GOOS}_${GOARCH}.tar.gz"
              tar -C "${workdir}" -czf "${asset}" "ds${ext}" LICENSE README.md
            fi
          done

          checksum_file="dist/ds_${VERSION}_SHA256SUMS"
          sha256sum dist/ds_* > "${checksum_file}"

      - name: Verify the Linux reference artifact reports its version
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          mkdir -p dist/verify
          tar -C dist/verify -xzf "dist/ds_${VERSION}_linux_amd64.tar.gz"
          test "$(dist/verify/ds --version)" = "ds ${VERSION}"

      - name: Publish GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          if gh release view "${VERSION}" >/dev/null 2>&1; then
            gh release upload "${VERSION}" dist/ds_* --clobber
            exit 0
          fi
          gh release create "${VERSION}" dist/ds_* --title "${VERSION}" --generate-notes --target "${GITHUB_SHA}"
